<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - FreshSip</title>
    <link rel="stylesheet" href="/static/forgot_password.css">
</head>

<body>

<div class="page-bg">
    <span class="blob blob-1">🍊</span>
    <span class="blob blob-2">🍋</span>
    <span class="blob blob-3">🍓</span>
    <span class="blob blob-4">🥭</span>
</div>

<div class="form-container">

    <div class="brand-header">
        <div class="brand-icon">🔐</div>
        <h1 class="brand-name">FreshSip</h1>
        <p class="brand-sub">Reset your password</p>
    </div>

    <h2>Forgot Password</h2>

    {% if error %}
        <p class="error">⚠ {{ error }}</p>
    {% endif %}

    {% if success %}
        <p class="success">✅ {{ success }}</p>
    {% endif %}

    <form method="POST">

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="divider-line">
            <span>Set New Password</span>
        </div>

        <div class="field">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" placeholder="Enter new password" required>
        </div>

        <div class="field">
            <label for="re_new_password">Re-enter New Password</label>
            <input type="password" id="re_new_password" name="re_new_password" placeholder="Confirm new password" required>
        </div>

        <button type="submit">Update Password 🔑</button>

    </form>

    <p class="back-link"><a href="/login">← Back to Login</a></p>

</div>

</body>
</html>
